      <stop offset="0.72" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#d1faef"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f9f82"/>
      <stop offset="1" stop-color="#1769c2"/>
