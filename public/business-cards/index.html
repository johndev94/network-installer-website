<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RDNS Business Cards</title>
    <style>
      :root {
        color: #102033;
        background: #f8fbfd;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      header {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px 20px;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.1;
      }

      p {
        color: #5d6d7d;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      a,
      button {
        border: 0;
        border-radius: 8px;
        background: #087d6c;
        color: white;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-weight: 800;
        padding: 11px 15px;
        text-decoration: none;
      }

      .secondary {
        background: #102033;
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 10px 20px 44px;
      }

      .preview-grid {
        display: grid;
        gap: 24px;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      }

      figure {
        margin: 0;
      }

      figcaption {
        color: #5d6d7d;
        font-size: 14px;
        font-weight: 750;
        margin-bottom: 8px;
      }

      img.card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 18px 55px rgba(16, 32, 51, 0.13);
        display: block;
        width: 100%;
      }

      .print-pages {
        display: none;
      }

      @page {
        margin: 10mm;
        size: A4;
      }

      @media print {
        header,
        main {
          display: none;
        }

        body {
          background: white;
        }

        .print-pages {
          display: block;
        }

        .print-page {
          break-after: page;
          display: grid;
          gap: 6mm;
          grid-template-columns: repeat(2, 85mm);
          justify-content: center;
          padding-top: 4mm;
        }

        .print-page:last-child {
          break-after: auto;
        }

        .print-page img {
          display: block;
          height: 55mm;
          width: 85mm;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>RDNS Business Cards</h1>
      <p>
        Print-ready 85mm by 55mm business cards for John Devaney and Sean Ryan,
        plus a shared back design. Use the SVG files for best print quality, or
        print this page at 100% scale with background graphics enabled.
      </p>
      <div class="actions">
        <button type="button" onclick="window.print()">Print Sheet</button>
        <a href="./front-john-devaney.svg" download>Download John Front</a>
        <a href="./front-sean-ryan.svg" download>Download Sean Front</a>
        <a class="secondary" href="./back-rdns.svg" download>Download Back</a>
      </div>
    </header>

    <main>
      <div class="preview-grid">
        <figure>
          <figcaption>John Devaney front</figcaption>
          <img class="card" src="./front-john-devaney.svg" alt="RDNS John Devaney business card front" />
        </figure>
        <figure>
          <figcaption>Sean Ryan front</figcaption>
          <img class="card" src="./front-sean-ryan.svg" alt="RDNS Sean Ryan business card front" />
        </figure>
        <figure>
          <figcaption>Shared back</figcaption>
          <img class="card" src="./back-rdns.svg" alt="RDNS business card back" />
        </figure>
      </div>
    </main>

    <section class="print-pages" aria-hidden="true">
      <div class="print-page">
        <img src="./front-john-devaney.svg" alt="" />
        <img src="./front-sean-ryan.svg" alt="" />
        <img src="./front-john-devaney.svg" alt="" />
        <img src="./front-sean-ryan.svg" alt="" />
        <img src="./front-john-devaney.svg" alt="" />
        <img src="./front-sean-ryan.svg" alt="" />
        <img src="./front-john-devaney.svg" alt="" />
        <img src="./front-sean-ryan.svg" alt="" />
      </div>
      <div class="print-page">
        <img src="./back-rdns.svg" alt="" />
        <img src="./back-rdns.svg" alt="" />
        <img src="./back-rdns.svg" alt="" />
        <img src="./back-rdns.svg" alt="" />
        <img src="./back-rdns.svg" alt="" />
        <img src="./back-rdns.svg" alt="" />
        <img src="./back-rdns.svg" alt="" />
        <img src="./back-rdns.svg" alt="" />
      </div>
    </section>
  </body>
</html>
