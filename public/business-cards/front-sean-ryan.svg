<svg xmlns="http://www.w3.org/2000/svg" width="85mm" height="55mm" viewBox="0 0 850 550" role="img" aria-labelledby="title desc">
  <title id="title">RDNS business card front for Sean Ryan</title>
  <desc id="desc">Print-ready front business card artwork for Sean Ryan at Ryan and Devaney Network Solutions.</desc>
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102033"/>
      <stop offset="0.55" stop-color="#102a3d"/>
      <stop offset="1" stop-color="#063b45"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f9f82"/>
      <stop offset="1" stop-color="#1769c2"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#03131f" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="850" height="550" rx="0" fill="url(#card-bg)"/>
  <path d="M575 -80 C755 25 862 168 910 350 C760 312 620 345 492 451 C383 542 233 586 56 582 C181 488 254 372 276 236 C299 95 398 0 575 -80 Z" fill="url(#accent)" opacity="0.34"/>
  <path d="M620 0 C762 76 837 189 846 338 C730 315 604 355 468 456 C358 538 225 575 69 568 C199 480 271 363 287 217 C302 86 413 13 620 0 Z" fill="#ffffff" opacity="0.05"/>

  <g opacity="0.13" stroke="#d1faef" stroke-width="2">
    <path d="M35 122 H350 M35 182 H280 M35 242 H320 M35 302 H245 M35 362 H300"/>
    <path d="M102 70 V410 M182 52 V410 M262 66 V410"/>
    <circle cx="102" cy="122" r="5" fill="#d1faef"/>
    <circle cx="182" cy="242" r="5" fill="#d1faef"/>
    <circle cx="262" cy="182" r="5" fill="#d1faef"/>
  </g>

  <g transform="translate(58 54)">
    <rect width="68" height="68" rx="14" fill="#0f9f82" filter="url(#soft-shadow)"/>
    <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 35 H47"/>
      <path d="M34 22 V48"/>
      <circle cx="21" cy="35" r="6" fill="#0f9f82"/>
      <circle cx="47" cy="35" r="6" fill="#0f9f82"/>
      <circle cx="34" cy="22" r="6" fill="#0f9f82"/>
      <circle cx="34" cy="48" r="6" fill="#0f9f82"/>
    </g>
  </g>
  <text x="145" y="83" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" letter-spacing="0">RDNS</text>
  <text x="145" y="113" fill="#d1faef" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Ryan &amp; Devaney Network Solutions</text>

  <g transform="translate(58 206)">
    <text x="0" y="0" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="850">Sean Ryan</text>
    <text x="0" y="38" fill="#d1faef" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="750">Network, WiFi, Security &amp; CCTV Solutions</text>
    <rect x="0" y="64" width="380" height="4" rx="2" fill="url(#accent)"/>
  </g>

  <g transform="translate(58 350)" fill="#eef7ff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650">
    <g transform="translate(0 0)">
      <circle cx="12" cy="-6" r="11" fill="#0f9f82"/>
      <path d="M5 -9 L12 -4 L19 -9" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="0">johndevaney1@hotmail.com</text>
    </g>
    <g transform="translate(0 48)">
      <circle cx="12" cy="-6" r="11" fill="#1769c2"/>
      <path d="M12 -16 C17 -16 21 -12 21 -7 C21 0 12 8 12 8 C12 8 3 0 3 -7 C3 -12 7 -16 12 -16 Z" fill="none" stroke="#ffffff" stroke-width="2.3"/>
      <circle cx="12" cy="-7" r="2.8" fill="#ffffff"/>
      <text x="36" y="0">Mayo, Ireland and surrounding areas</text>
    </g>
    <g transform="translate(0 96)">
      <circle cx="12" cy="-6" r="11" fill="#0f9f82"/>
      <path d="M5 -4 C9 -8 15 -8 19 -4 M8 0 C10 -2 14 -2 16 0" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
      <text x="36" y="0">WiFi | Networks | Security | CCTV</text>
    </g>
  </g>

  <g transform="translate(620 360)">
    <rect width="170" height="104" rx="18" fill="#ffffff" opacity="0.11"/>
    <text x="24" y="40" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Connected</text>
    <text x="24" y="66" fill="#d1faef" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Secure</text>
    <text x="24" y="92" fill="#eef7ff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Protected</text>
  </g>
</svg>
